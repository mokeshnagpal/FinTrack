<!doctype html>
{% from "macros/ui.html" import auth_layout %}
<html lang="en" data-theme="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="csrf-token" content="{{ csrf_token() }}" />
    <title>FinTrak - View-only</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>

<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% call auth_layout('FinTrak', 'Open view-only for a user', messages=messages) %}
        <form method="post" action="{{ url_for('view_login') }}" novalidate>
            {{ form.hidden_tag() }}
            <div class="stack">
                <label class="kicker" for="username">Username</label>
                <input id="username" name="username" class="form-control" type="email" placeholder="email"
                    maxlength="120"
                    value="{{ request.form.username or '' }}" autocomplete="username" autofocus />

                <label class="kicker" for="password">Password</label>
                <input id="password" name="password" class="form-control" type="password"
                    placeholder="View-only password" autocomplete="current-password" maxlength="128" />
            </div>

            <div class="form-foot">
                <button type="submit" class="btn btn-primary">Open view</button>
                <a href="{{ url_for('login') }}" class="small-muted">Admin Mode</a>
            </div>
        </form>
    {% endcall %}
    {% endwith %}

    <script>
        window.FinTrakConstants = {{ client_constants | tojson }};
    </script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script src="{{ url_for('static', filename='js/browser_cache.js') }}"></script>
    <script src="{{ url_for('static', filename='js/offline_queue.js') }}"></script>
    <script src="{{ url_for('static', filename='js/flash.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth_status.js') }}"></script>
</body>

</html>
